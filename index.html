<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイスプラ指南ツール</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --yellow: #eaff3d;
            --pink: #f02d7d;
            --teal: #0cf2b4;
            --purple: #603bff;
            --purple-dark: #3a1cba;
            --gold: #ffaa00;
            --bg: #131320;
            --bg2: #1c1c2e;
            --bg3: #242438;
            --card: #252540;
            --border: #3a3a5c;
            --text-sub: #9999bb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'M PLUS Rounded 1c', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .site-header {
            background: linear-gradient(135deg, #1a1a30 0%, #0d0d1a 100%);
            border-bottom: 2px solid var(--purple);
            padding: 16px 20px 12px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(96, 59, 255, 0.3);
        }

        /* ===== LOGO ===== */
        .logo-main {
            font-size: clamp(2em, 7vw, 3em);
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--yellow);
            text-shadow: 0 0 20px rgba(234, 255, 61, 0.7), 0 0 50px rgba(234, 255, 61, 0.3);
            display: inline-block;
        }

        .logo-sub {
            font-size: clamp(2em, 7vw, 3em);
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            margin-left: 12px;
            opacity: 0.85;
        }

        .logo-caption {
            font-size: 0.75em;
            color: var(--text-sub);
            letter-spacing: 4px;
            margin-top: 2px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1em;
            font-weight: 900;
        }

        .section-accent {
            color: var(--teal);
            font-weight: 900;
            margin-right: 4px;
        }

        /* --- Stats Bar --- */
        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: clamp(0.75em, 2.5vw, 0.9em);
        }

        .stat-chip {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-chip .label {
            color: var(--text-sub);
        }

        .stat-chip .value {
            font-weight: 700;
            color: #fff;
        }

        .stat-chip .value.win-rate {
            color: var(--teal);
        }

        .stat-chip .value.today {
            color: var(--yellow);
        }

        /* ===== TABS ===== */
        .tab-bar {
            display: flex;
            background: var(--bg2);
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            color: var(--text-sub);
            font-family: inherit;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            position: relative;
        }

        .tab-btn.active {
            color: var(--yellow);
            border-bottom-color: var(--yellow);
            background: rgba(234, 255, 61, 0.05);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        .tab-content {
            display: none;
            padding: 20px 16px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== SPREADSHEET LINK ===== */
        .spreadsheet-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .spreadsheet-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #217a3b, #2ea44f);
            color: #fff;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.95em;
            box-shadow: 0 4px 15px rgba(46, 164, 79, 0.4);
            transition: 0.2s;
        }

        .spreadsheet-link a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 164, 79, 0.5);
        }

        /* ===== SCHEDULE CARDS ===== */
        .schedule-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .rule-card {
            border-radius: 16px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card);
        }

        .rule-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .rule-card.card-yellow::before {
            background: linear-gradient(90deg, var(--yellow), #b8cc00);
        }

        .rule-card.card-pink::before {
            background: linear-gradient(90deg, var(--pink), #c4006a);
        }

        .rule-card.card-teal::before {
            background: linear-gradient(90deg, var(--teal), #09b888);
        }

        .rule-card-header {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        .rule-card-mode {
            font-size: 0.8em;
            color: var(--text-sub);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rule-card-name {
            font-size: 1.15em;
            font-weight: 900;
            color: #fff;
            margin-top: 2px;
        }

        .rule-card-detail {
            font-size: 0.85em;
            font-weight: 700;
            margin-top: 4px;
        }

        .stage-name {
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid var(--purple);
        }

        /* ===== RECORD FORM ===== */
        .record-form {
            background: var(--bg2);
            border: 2px solid var(--teal);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(12, 242, 180, 0.1);
        }

        .record-form h2 {
            color: var(--teal);
            margin: 0 0 20px;
            text-align: center;
            font-size: 1.3em;
            font-weight: 900;
        }

        .form-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        select,
        input[type="number"],
        input[type="text"] {
            background: var(--bg3);
            color: #fff;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus,
        input:focus {
            border-color: var(--teal);
        }

        /* --- Counter --- */
        .counter-group {
            display: flex;
            align-items: center;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .counter-group label {
            padding: 0 10px;
            color: var(--text-sub);
            font-size: 0.85em;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.2);
            height: 100%;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
        }

        .counter-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.4em;
            font-weight: 700;
            width: 40px;
            height: 44px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .counter-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .counter-value {
            min-width: 36px;
            text-align: center;
            font-size: 1.3em;
            font-weight: 900;
            color: #fff;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            padding: 0 4px;
        }

        /* --- WIN/LOSE Buttons --- */
        .result-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
        }

        .btn-win,
        .btn-lose {
            font-size: 1.4em;
            font-weight: 900;
            padding: 16px 40px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-win {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #000;
            box-shadow: 0 6px 0 #c47a00, 0 0 20px rgba(255, 170, 0, 0.3);
        }

        .btn-win:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #c47a00, 0 0 30px rgba(255, 170, 0, 0.4);
        }

        .btn-win:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c47a00;
        }

        .btn-lose {
            background: linear-gradient(135deg, #666, #444);
            color: #fff;
            box-shadow: 0 6px 0 #222, 0 0 10px rgba(0, 0, 0, 0.4);
        }

        .btn-lose:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #777, #555);
        }

        .btn-lose:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #222;
        }

        #save-msg {
            color: var(--yellow);
            font-weight: 700;
            text-align: center;
            height: 24px;
            margin-top: 10px;
            font-size: 0.95em;
        }

        /* ===== FULLSCREEN RESULT OVERLAY ===== */
        #result-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
        }

        #result-overlay.show {
            animation: overlayFlash 0.9s ease forwards;
        }

        @keyframes overlayFlash {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            20% {
                opacity: 1;
                transform: scale(1.1);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }

            75% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: scale(1.15);
            }
        }

        .overlay-win {
            background: radial-gradient(circle, rgba(255, 170, 0, 0.25) 0%, transparent 70%);
        }

        .overlay-lose {
            background: radial-gradient(circle, rgba(100, 100, 100, 0.25) 0%, transparent 70%);
        }

        #result-overlay .result-text {
            font-size: clamp(4em, 18vw, 10em);
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 0 40px currentColor;
        }

        .overlay-win .result-text {
            color: var(--gold);
        }

        .overlay-lose .result-text {
            color: #aaa;
        }

        /* ===== ADVICE ===== */
        .advice-container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .advice-title {
            color: #fff;
            font-size: 1.15em;
            margin-bottom: 16px;
            font-weight: 900;
            text-align: center;
        }

        .compare-box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .compare-card {
            background: var(--bg3);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        .compare-card .card-title {
            font-weight: 900;
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .winner-card {
            border: 2px solid var(--gold);
            box-shadow: 0 0 24px rgba(255, 170, 0, 0.3);
            transform: scale(1.02);
        }

        .loser-card {
            opacity: 0.65;
        }

        .weapon-list {
            font-size: 0.88em;
        }

        .weapon-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
            gap: 8px;
        }

        .weapon-item:last-child {
            border-bottom: none;
        }

        .high-win {
            color: var(--teal);
            font-weight: 700;
        }

        .low-win {
            color: #888;
        }

        .no-data {
            color: #555;
            font-style: italic;
        }

        .conclusion {
            margin-top: 16px;
            font-size: 1.15em;
            font-weight: 900;
            padding: 14px 18px;
            background: linear-gradient(135deg, #2a2a40, #1e1e30);
            border-radius: 12px;
            border-left: 4px solid var(--yellow);
            text-align: center;
        }

        /* ===== HISTORY ===== */
        .section-title {
            font-size: 1.1em;
            font-weight: 900;
            color: #fff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .today-container,
        .history-container {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: var(--bg3);
            padding: 12px 14px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(4px);
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-info .rule-label {
            font-weight: 700;
            color: var(--teal);
            font-size: 0.9em;
            margin-bottom: 2px;
        }

        .history-info .stage-weapon {
            color: var(--text-sub);
            font-size: 0.82em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-info .history-date {
            color: #555;
            font-size: 0.78em;
            margin-top: 2px;
        }

        .history-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .result-badge {
            font-weight: 900;
            font-size: 0.85em;
            padding: 3px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .badge-win {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #000;
        }

        .badge-lose {
            background: #333;
            color: #888;
            border: 1px solid #555;
        }

        .history-kd {
            font-weight: 900;
            font-size: 1.1em;
            color: #fff;
        }

        /* ===== ANALYSIS MODE ===== */
        .rule-section {
            background: var(--bg2);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 16px;
            border-left: 5px solid var(--pink);
        }

        .rule-section h3 {
            color: var(--yellow);
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            font-size: 1.3em;
        }

        .stages-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .stage-box {
            background: var(--bg3);
            padding: 14px;
            border-radius: 10px;
            flex: 1;
            min-width: 230px;
            border-top: 3px solid var(--purple);
        }

        .stage-box h4 {
            color: var(--teal);
            margin: 0 0 10px;
            font-size: 1em;
        }

        /* ===== RESET BTN ===== */
        .reset-btn {
            display: block;
            background: transparent;
            color: var(--text-sub);
            border: 1px solid var(--border);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px auto 40px;
            font-family: inherit;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            color: #fff;
            border-color: #888;
        }

        /* ===== TODAY EMPTY ===== */
        .no-today {
            color: var(--text-sub);
            font-size: 0.9em;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>

<body>

    <!-- FULLSCREEN RESULT OVERLAY -->
    <div id="result-overlay">
        <div class="result-text" id="overlay-text"></div>
    </div>

    <!-- HEADER -->
    <header class="site-header">
        <h1><span class="logo-main">SPLA</span><span class="logo-sub">GUIDE</span></h1>
        <div class="logo-caption">リアルタイム指南ツール</div>
        <div class="stats-bar" id="stats-bar">
            <div class="stat-chip"><span class="label">通算</span><span class="value" id="stat-total">--</span>戦</div>
            <div class="stat-chip"><span class="label">勝率</span><span class="value win-rate"
                    id="stat-winrate">--%</span></div>
            <div class="stat-chip"><span class="label">今日</span><span class="value today" id="stat-today">--</span>戦
            </div>
            <div class="stat-chip"><span class="label">今日勝率</span><span class="value win-rate"
                    id="stat-today-rate">--%</span></div>
        </div>
        </div>
    </header>

    <!-- TABS -->
    <div class="tab-bar">
        <button class="tab-btn active" id="tab-record-btn" onclick="switchTab('record')">▶ 記録・指南</button>
        <button class="tab-btn" id="tab-analysis-btn" onclick="switchTab('analysis')">◈ 全データ分析</button>
    </div>

    <!-- TAB: 記録モード -->
    <div class="tab-content active" id="tab-record">

        <div class="spreadsheet-link">
            <a href="https://docs.google.com/spreadsheets/d/1TdTjlwc34-GDiI7n-kNmp_yVlNtrHr7gulNJBAhRAGc/edit?gid=0#gid=0"
                target="_blank">
                ↗ スプレッドシートの戦績表を開く
            </a>
        </div>

        <div class="schedule-container" id="schedule">
            <p style="color:#ccc; text-align:center; grid-column:1/-1;">スケジュールを取得中...</p>
        </div>

        <div class="record-form">
            <h2><span style="color:var(--text-sub);font-weight:400;font-size:0.75em;letter-spacing:3px;">//</span>
                RECORD</h2>
            <div class="form-row">
                <select id="input-rule" onchange="updateStageDropdown()">
                    <option value="バンカラ (チャレンジ)">バンカラ (チャレンジ)</option>
                    <option value="バンカラ (オープン)">バンカラ (オープン)</option>
                    <option value="Xマッチ">Xマッチ</option>
                    <option value="ナワバリバトル">ナワバリバトル</option>
                </select>
                <select id="input-stage" style="min-width:180px;">
                    <option value="">ステージ読み込み中...</option>
                </select>
            </div>
            <div class="form-row">
                <select id="input-weapon">
                    <option value="リッター4K">リッター4K</option>
                    <option value="リッター4Kスコープ">リッター4Kスコープ</option>
                    <option value="リッター4Kカスタム">リッター4Kカスタム</option>
                    <option value="リッター4Kカスタムスコープ">リッター4Kカスタムスコープ</option>
                    <option value="R-PEN/5H">R-PEN/5H</option>
                    <option value="スプラチャージャースコープ">スプラチャージャースコープ</option>
                    <option value="トライストリンガーコラボ">トライストリンガーコラボ</option>
                    <option value="バレルスピナー">バレルスピナー</option>
                    <option value="ホクサイ・ヒュー">ホクサイ・ヒュー</option>
                    <option value="ダイナモローラー">ダイナモローラー</option>
                </select>
            </div>
            <div class="form-row">
                <div class="counter-group">
                    <label>K</label>
                    <button class="counter-btn" onclick="changeCounter('kill', -1)">－</button>
                    <div class="counter-value" id="display-kill">0</div>
                    <button class="counter-btn" onclick="changeCounter('kill', 1)">＋</button>
                </div>
                <div class="counter-group">
                    <label>D</label>
                    <button class="counter-btn" onclick="changeCounter('death', -1)">－</button>
                    <div class="counter-value" id="display-death">0</div>
                    <button class="counter-btn" onclick="changeCounter('death', 1)">＋</button>
                </div>
            </div>
            <div class="result-btns">
                <button class="btn-win" onclick="saveRecord('win')">WIN</button>
                <button class="btn-lose" onclick="saveRecord('lose')">LOSE</button>
            </div>
            <div id="save-msg"></div>
        </div>

        <div class="advice-container" id="advice">
            <div class="advice-title">— AI 分析スタンバイ中...</div>
        </div>

        <div class="today-container" id="today-box" style="display:none;">
            <div class="section-title"><span class="section-accent">—</span> TODAY</div>
            <div class="history-list" id="today-list"></div>
        </div>

        <div class="history-container" id="history-box" style="display:none;">
            <div class="section-title"><span class="section-accent">—</span> HISTORY <span
                    style="font-weight:400;font-size:0.85em;color:var(--text-sub);">/ 最新10件</span></div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <!-- TAB: 分析モード -->
    <div class="tab-content" id="tab-analysis">
        <h2 style="text-align:center; color:var(--yellow); margin-bottom:24px; font-weight:900; letter-spacing:2px;">
            WEAPON RANKING</h2>
        <p style="text-align:center;color:var(--text-sub);margin:-16px 0 24px;font-size:0.9em;">ルール・ステージ別 最強ブキ</p>
        <div id="analysis-content">
            <p style="text-align:center; color:#ccc;">データを集計しています...</p>
        </div>
    </div>

    <button class="reset-btn" onclick="resetData()">キャッシュを消去</button>

    <script>
        const myWeapons = [
            'リッター4K', 'リッター4Kスコープ', 'リッター4Kカスタム', 'リッター4Kカスタムスコープ',
            'R-PEN/5H', 'スプラチャージャースコープ', 'トライストリンガーコラボ', 'バレルスピナー',
            'ホクサイ・ヒュー', 'ダイナモローラー'
        ];
        const STORAGE_KEY = 'spla_my_records';
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwXBXAkhzPBi5ka_nphYoKqO-EO6xYPr3wEqP3OCP6OwPKnv7AU-YFkuogGAb1FbZOCYw/exec";

        let ruleStageMap = {};
        let currentRuleDetailMap = {
            'バンカラ (オープン)': '不明',
            'バンカラ (チャレンジ)': '不明',
            'Xマッチ': '不明',
            'ナワバリバトル': 'レギュラー'
        };

        // カウンター値
        let killCount = 0, deathCount = 0;
        function changeCounter(type, delta) {
            if (type === 'kill') {
                killCount = Math.max(0, killCount + delta);
                document.getElementById('display-kill').textContent = killCount;
            } else {
                deathCount = Math.max(0, deathCount + delta);
                document.getElementById('display-death').textContent = deathCount;
            }
        }

        // タブ切り替え
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('tab-' + tab + '-btn').classList.add('active');
            if (tab === 'analysis') renderFullAnalysis();
        }

        // 結果オーバーレイ
        function showResultOverlay(isWin) {
            const el = document.getElementById('result-overlay');
            const txt = document.getElementById('overlay-text');
            el.className = isWin ? 'overlay-win' : 'overlay-lose';
            txt.textContent = isWin ? 'WIN!' : 'LOSE...';
            el.classList.add('show');
            setTimeout(() => { el.classList.remove('show'); el.className = ''; }, 900);
        }

        // 戦績保存
        function saveRecord(result) {
            const mode = document.getElementById('input-rule').value;
            const stage = document.getElementById('input-stage').value || '不明';
            const weapon = document.getElementById('input-weapon').value;
            const detailRule = currentRuleDetailMap[mode] || "不明";

            const recordData = {
                date: new Date().getTime(), rule: mode, detailRule: detailRule,
                stage: stage, weapon: weapon, kill: killCount, death: deathCount, result: result
            };

            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            records.push(recordData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

            showResultOverlay(result === 'win');
            renderAdvice();
            updateStatsBar();

            document.getElementById('save-msg').textContent = "⏳ スプレッドシートへ送信中...";

            fetch(GAS_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(recordData)
            }).then(() => {
                document.getElementById('save-msg').textContent = "✅ 送信完了！";
                killCount = 0; deathCount = 0;
                document.getElementById('display-kill').textContent = 0;
                document.getElementById('display-death').textContent = 0;
                setTimeout(() => { document.getElementById('save-msg').textContent = ""; }, 3000);
            }).catch(() => {
                document.getElementById('save-msg').textContent = "⚠️ 送信エラー（ローカル保存済）";
            });
        }

        async function loadDataFromSpreadsheet() {
            try {
                const response = await fetch(GAS_URL);
                const dbRecords = await response.json();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dbRecords));
                renderAdvice();
                updateStatsBar();
            } catch (error) { console.error("同期エラー:", error); renderAdvice(); updateStatsBar(); }
        }

        function resetData() {
            if (confirm("スマホの記憶（キャッシュ）を消去しますか？\n※スプレッドシートのデータは消えません。")) {
                localStorage.removeItem(STORAGE_KEY);
                renderAdvice(); updateStatsBar();
            }
        }

        // Stats Bar 更新
        function updateStatsBar() {
            const records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const total = records.length;
            const wins = records.filter(r => r.result === 'win').length;
            const rate = total > 0 ? Math.round((wins / total) * 100) : '--';
            const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
            const todayRecords = records.filter(r => r.date >= todayStart.getTime());
            const todayCount = todayRecords.length;
            const todayWins = todayRecords.filter(r => r.result === 'win').length;
            const todayRate = todayCount > 0 ? Math.round((todayWins / todayCount) * 100) : '--';
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-winrate').textContent = rate + (total > 0 ? '%' : '');
            document.getElementById('stat-today').textContent = todayCount;
            document.getElementById('stat-today-rate').textContent = todayCount > 0 ? todayRate + '%' : '--%';
        }

        function updateStageDropdown() {
            const selectedMode = document.getElementById('input-rule').value;
            const stageSelect = document.getElementById('input-stage');
            stageSelect.innerHTML = '';
            const stages = ruleStageMap[selectedMode] || [];
            if (stages.length > 0) {
                stages.forEach(s => { stageSelect.innerHTML += `<option value="${s}">${s}</option>`; });
            } else {
                stageSelect.innerHTML = `<option value="">開催されていません</option>`;
            }
        }

        async function fetchSchedule() {
            try {
                const [scheduleRes, localeRes] = await Promise.all([
                    fetch('https://splatoon3.ink/data/schedules.json'),
                    fetch('https://splatoon3.ink/data/locale/ja-JP.json')
                ]);
                const data = await scheduleRes.json();
                const locale = await localeRes.json();

                function getStageName(stage) { return locale.stages[stage.id]?.name || stage.name; }
                function getRuleName(rule) { return locale.rules[rule.id]?.name || rule.name; }

                const now = new Date().getTime();
                function getCurrent(nodes) {
                    return nodes.find(n => {
                        const start = new Date(n.startTime).getTime();
                        const end = new Date(n.endTime).getTime();
                        return start <= now && now < end;
                    }) || nodes[0];
                }

                const regularNode = getCurrent(data.data.regularSchedules.nodes);
                const bankaraNode = getCurrent(data.data.bankaraSchedules.nodes);
                const xMatchNode = getCurrent(data.data.xSchedules.nodes);

                const container = document.getElementById('schedule');
                container.innerHTML = '';
                ruleStageMap = {};
                currentRuleDetailMap = {};

                function createCard(mode, modeName, ruleName, s1, s2, colorClass) {
                    return `
                    <div class="rule-card ${colorClass}">
                        <div class="rule-card-header">
                            <div class="rule-card-mode">${modeName}</div>
                            <div class="rule-card-name">${mode}</div>
                            <div class="rule-card-detail" style="color:var(--teal);">【${ruleName}】</div>
                        </div>
                        <div class="stage-name">› ${s1}</div>
                        <div class="stage-name">› ${s2}</div>
                    </div>
                `;
                }

                if (regularNode && regularNode.regularMatchSetting) {
                    const setting = regularNode.regularMatchSetting;
                    const s1 = getStageName(setting.vsStages[0]), s2 = getStageName(setting.vsStages[1]);
                    const ruleName = getRuleName(setting.vsRule);
                    container.innerHTML += createCard('ナワバリバトル', 'REGULAR', ruleName, s1, s2, 'card-yellow');
                    ruleStageMap['ナワバリバトル'] = [s1, s2]; currentRuleDetailMap['ナワバリバトル'] = ruleName;
                }
                if (bankaraNode && bankaraNode.bankaraMatchSettings) {
                    const bankaraOpen = bankaraNode.bankaraMatchSettings.find(s => s.bankaraMode === 'OPEN');
                    const bankaraChallenge = bankaraNode.bankaraMatchSettings.find(s => s.bankaraMode === 'CHALLENGE');
                    if (bankaraOpen) {
                        const s1 = getStageName(bankaraOpen.vsStages[0]), s2 = getStageName(bankaraOpen.vsStages[1]);
                        const ruleName = getRuleName(bankaraOpen.vsRule);
                        container.innerHTML += createCard('バンカラ (オープン)', 'BANKARA OPEN', ruleName, s1, s2, 'card-pink');
                        ruleStageMap['バンカラ (オープン)'] = [s1, s2]; currentRuleDetailMap['バンカラ (オープン)'] = ruleName;
                    }
                    if (bankaraChallenge) {
                        const s1 = getStageName(bankaraChallenge.vsStages[0]), s2 = getStageName(bankaraChallenge.vsStages[1]);
                        const ruleName = getRuleName(bankaraChallenge.vsRule);
                        container.innerHTML += createCard('バンカラ (チャレンジ)', 'BANKARA CHALLENGE', ruleName, s1, s2, 'card-pink');
                        ruleStageMap['バンカラ (チャレンジ)'] = [s1, s2]; currentRuleDetailMap['バンカラ (チャレンジ)'] = ruleName;
                    }
                }
                if (xMatchNode && xMatchNode.xMatchSetting) {
                    const setting = xMatchNode.xMatchSetting;
                    const s1 = getStageName(setting.vsStages[0]), s2 = getStageName(setting.vsStages[1]);
                    const ruleName = getRuleName(setting.vsRule);
                    container.innerHTML += createCard('Xマッチ', 'X BATTLE', ruleName, s1, s2, 'card-teal');
                    ruleStageMap['Xマッチ'] = [s1, s2]; currentRuleDetailMap['Xマッチ'] = ruleName;
                }
                updateStageDropdown();
            } catch (error) {
                document.getElementById('schedule').innerHTML = `<p style="color:#ff4444; grid-column:1/-1; text-align:center;">スケジュール取得失敗</p>`;
            }
            renderAdvice();
        }

        function buildHistoryItemHtml(r) {
            const isWin = r.result === 'win';
            const d = new Date(r.date);
            const dateStr = `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
            return `
            <div class="history-item">
                <div class="history-info">
                    <div class="rule-label">${r.rule}【${r.detailRule || '不明'}】</div>
                    <div class="stage-weapon">› ${r.stage} · ${r.weapon}</div>
                    <div class="history-date">${dateStr}</div>
                </div>
                <div class="history-right">
                    <span class="result-badge ${isWin ? 'badge-win' : 'badge-lose'}">${isWin ? 'WIN' : 'LOSE'}</span>
                    <div class="history-kd">${r.kill}k / ${r.death}d</div>
                </div>
            </div>
        `;
        }

        function renderAdvice() {
            const adviceContainer = document.getElementById('advice');
            const historyBox = document.getElementById('history-box');
            const todayBox = document.getElementById('today-box');

            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            // 今日の戦績
            const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
            const todayRecords = records.filter(r => r.date >= todayStart.getTime()).sort((a, b) => b.date - a.date);
            if (todayRecords.length > 0) {
                todayBox.style.display = 'block';
                document.getElementById('today-list').innerHTML = todayRecords.map(buildHistoryItemHtml).join('');
            } else {
                todayBox.style.display = 'none';
            }

            function calcWinRates(modeName) {
                const targetDetailRule = currentRuleDetailMap[modeName] || "不明";
                const currentStages = ruleStageMap[modeName] || [];
                const filteredRecords = records.filter(r => {
                    if (currentStages.length === 0) return r.detailRule === targetDetailRule;
                    return r.detailRule === targetDetailRule && currentStages.includes(r.stage);
                });
                return myWeapons.map(weapon => {
                    const wr = filteredRecords.filter(r => r.weapon === weapon);
                    const total = wr.length;
                    const wins = wr.filter(r => r.result === 'win').length;
                    if (total < 5) return { name: weapon, rate: -1, text: total === 0 ? 'データなし' : `データ不足 (${total}戦)`, total: total };
                    return { name: weapon, rate: Math.round((wins / total) * 100), text: `${Math.round((wins / total) * 100)}% (${wins}勝/${total}戦)`, total: total };
                }).sort((a, b) => b.rate - a.rate);
            }

            const openData = calcWinRates('バンカラ (オープン)');
            const challengeData = calcWinRates('バンカラ (チャレンジ)');
            const xMatchData = calcWinRates('Xマッチ');
            const topOpen = openData[0].rate >= 0 ? openData[0].rate : -1;
            const topChallenge = challengeData[0].rate >= 0 ? challengeData[0].rate : -1;
            const topXMatch = xMatchData[0].rate >= 0 ? xMatchData[0].rate : -1;
            const maxWinRate = Math.max(topOpen, topChallenge, topXMatch);

            if (maxWinRate === -1) {
                adviceContainer.innerHTML = `
                <div class="advice-title">— 「ルール＋ステージ」完全一致データ待ち...</div>
                <p style="color:#ccc; text-align:center;">現在のスケジュールに一致する過去データがありません。</p>
            `;
                historyBox.style.display = 'none';
                return;
            }

            const isOpenBest = maxWinRate === topOpen;
            const isChallengeBest = maxWinRate === topChallenge && !isOpenBest;
            const isXMatchBest = maxWinRate === topXMatch && !isOpenBest && !isChallengeBest;

            let bestModeName = '', bestModeColor = '', bestWeaponName = '';
            if (isOpenBest) { bestModeName = 'バンカラ (オープン)'; bestModeColor = 'var(--pink)'; bestWeaponName = openData[0].rate >= 0 ? openData[0].name : ''; }
            else if (isChallengeBest) { bestModeName = 'バンカラ (チャレンジ)'; bestModeColor = 'var(--pink)'; bestWeaponName = challengeData[0].rate >= 0 ? challengeData[0].name : ''; }
            else { bestModeName = 'Xマッチ'; bestModeColor = 'var(--teal)'; bestWeaponName = xMatchData[0].rate >= 0 ? xMatchData[0].name : ''; }

            const ruleSelect = document.getElementById('input-rule');
            const weaponSelect = document.getElementById('input-weapon');
            if (ruleSelect.value !== bestModeName) { ruleSelect.value = bestModeName; updateStageDropdown(); }
            if (bestWeaponName) weaponSelect.value = bestWeaponName;

            function createWeaponListHtml(weaponData) {
                return '<div class="weapon-list">' + weaponData.map(w => {
                    let cls = w.rate >= 50 ? 'high-win' : (w.rate >= 0 ? 'low-win' : 'no-data');
                    return `<div class="weapon-item ${cls}"><span>${w.name}</span><span>${w.text}</span></div>`;
                }).join('') + '</div>';
            }

            adviceContainer.innerHTML = `
            <div class="advice-title">— 今の「ルール＋ステージ」に特化した勝率分析</div>
            <div class="compare-box">
                <div class="compare-card ${isOpenBest ? 'winner-card' : 'loser-card'}">
                    <div class="card-title">オープン【${currentRuleDetailMap['バンカラ (オープン)']}】</div>
                    ${createWeaponListHtml(openData)}
                </div>
                <div class="compare-card ${isChallengeBest ? 'winner-card' : 'loser-card'}">
                    <div class="card-title">チャレンジ【${currentRuleDetailMap['バンカラ (チャレンジ)']}】</div>
                    ${createWeaponListHtml(challengeData)}
                </div>
                <div class="compare-card ${isXMatchBest ? 'winner-card' : 'loser-card'}">
                    <div class="card-title">Xマッチ【${currentRuleDetailMap['Xマッチ']}】</div>
                    ${createWeaponListHtml(xMatchData)}
                </div>
            </div>
            <div class="conclusion">▶ 今は <span style="color:${bestModeColor};">「${bestModeName}」</span> が一番勝てそう！</div>
        `;

            historyBox.style.display = 'block';
            const sortedRecords = [...records].sort((a, b) => b.date - a.date).slice(0, 10);
            document.getElementById('history-list').innerHTML = sortedRecords.map(buildHistoryItemHtml).join('');
        }

        function renderFullAnalysis() {
            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            let analysisBox = document.getElementById('analysis-content');

            if (records.length === 0) {
                analysisBox.innerHTML = "<p style='text-align:center; color:#888;'>まだ記録がありません。</p>";
                return;
            }
            let dataMap = {};
            records.forEach(r => {
                let ruleName = (!r.detailRule || r.detailRule === '不明') ? '【過去の未分類データ】' : r.detailRule;
                let stageName = r.stage || "ステージ不明";
                let weaponName = r.weapon;
                if (!dataMap[ruleName]) dataMap[ruleName] = {};
                if (!dataMap[ruleName][stageName]) dataMap[ruleName][stageName] = {};
                if (!dataMap[ruleName][stageName][weaponName]) dataMap[ruleName][stageName][weaponName] = { win: 0, total: 0 };
                dataMap[ruleName][stageName][weaponName].total++;
                if (r.result === 'win') dataMap[ruleName][stageName][weaponName].win++;
            });

            let html = "";
            for (let rule in dataMap) {
                html += `<div class="rule-section"><h3>// ${rule}</h3><div class="stages-grid">`;
                for (let stage in dataMap[rule]) {
                    html += `<div class="stage-box"><h4>› ${stage}</h4>`;
                    let wDataValid = [];
                    let wDataInvalid = [];
                    for (let weapon in dataMap[rule][stage]) {
                        let d = dataMap[rule][stage][weapon];
                        let rate = Math.round((d.win / d.total) * 100);
                        if (d.total >= 5) {
                            wDataValid.push({ weapon, rate, win: d.win, total: d.total });
                        } else {
                            wDataInvalid.push({ weapon, rate: -1, win: d.win, total: d.total });
                        }
                    }
                    wDataValid.sort((a, b) => b.rate !== a.rate ? b.rate - a.rate : b.total - a.total);
                    wDataInvalid.sort((a, b) => b.total - a.total);

                    html += `<div class="weapon-list" style="margin-top:0;">`;
                    wDataValid.forEach((w, i) => {
                        let rank = i === 0 ? "🥇" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : "　"));
                        let cls = w.rate >= 50 ? 'high-win' : 'low-win';
                        html += `<div class="weapon-item ${cls}"><span>${rank} ${w.weapon}</span><span>${w.rate}% (${w.win}勝/${w.total}戦)</span></div>`;
                    });
                    wDataInvalid.forEach((w) => {
                        html += `<div class="weapon-item no-data"><span>　 ${w.weapon}</span><span>データ不足 (${w.total}戦)</span></div>`;
                    });
                    html += `</div></div>`;
                }
                html += `</div></div>`;
            }
            analysisBox.innerHTML = html;
        }

        fetchSchedule();
        loadDataFromSpreadsheet();
    </script>
</body>

</html>
